name: Reusable Lint
on:
  workflow_call:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Commitlint (last commit)
        run: |
          if [ -f "commitlint.config.js" ]; then
            npx commitlint --from HEAD~1 --to HEAD --verbose || true
          fi
